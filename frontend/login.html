<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login - CEI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .caixa-login {
      background-color: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 300px;
    }
    .caixa-login h2 {
      text-align: center;
      margin-bottom: 20px;
    }
    .caixa-login input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    .caixa-login button {
      width: 100%;
      padding: 10px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    .caixa-login button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

  <!-- Caixa do login -->
  <div class="caixa-login">
    <h2>Login</h2>
    
    <!-- Campo de usuário -->
    <input type="text" placeholder="Usuário" id="usuario">
    
    <!-- Campo de senha -->
    <input type="password" placeholder="Senha" id="senha">
    
    <!-- Botão de login -->
    <button onclick="fazerLogin()">Entrar</button>
  </div>

  <!-- Script básico que só mostra um alerta (placeholder pra conexão futura com o back-end) -->
  <script>
    function fazerLogin() {
      let user = document.getElementById("usuario").value;
      let senha = document.getElementById("senha").value;

      // Aqui no futuro a gente conecta com o back-end pra verificar se o login tá certo
      alert("Tentativa de login com: " + user + " / " + senha);
    }
  </script>

</body>
</html>
